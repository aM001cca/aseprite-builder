name: Build and Release Aseprite

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 环境

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ cmake ninja-build libx11-dev libxcursor-dev libxi-dev libgl1-mesa-dev libfontconfig1-dev

      - name: Build Aseprite
        run: |
          git clone https://github.com/aseprite/aseprite.git
          cd aseprite
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo -DLAF_BACKEND=skia ..
          ninja aseprite

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: aseprite-build
          path: aseprite/build/bin/aseprite
