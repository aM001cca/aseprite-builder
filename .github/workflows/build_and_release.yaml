name: Build and Release Aseprite

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 步骤 1：下载代码（包含子模块 skia）
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 步骤 2：安装依赖（包含 Skia 必须的 freetype/harfbuzz 等）
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ cmake ninja-build libx11-dev libxcursor-dev libxi-dev libgl1-mesa-dev libfontconfig1-dev libxrandr-dev libfreetype6-dev libharfbuzz-dev libjpeg-dev libpng-dev libwebp-dev

      # 步骤 3：编译
      - name: Build Aseprite
        run: |
          mkdir -p build
          cd build
          # 注意：命令最后有两个点 ".."，代表上一级目录
          cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo \
                -DLAF_BACKEND=skia \
                -DSKIA_DIR=$HOME/deps/skia \
                -DSKIA_LIBRARY_DIR=$HOME/deps/skia/out/Release-x64 \
                -G Ninja ..
          ninja aseprite
