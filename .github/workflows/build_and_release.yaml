name: Build and Release Aseprite

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          # 这里加上了 libxrandr-dev 和 libxi-dev
          sudo apt-get install -y g++ cmake ninja-build libx11-dev libxcursor-dev libxi-dev libgl1-mesa-dev libfontconfig1-dev libxrandr-dev

      - name: Clone Aseprite source
        run: git clone --recursive https://github.com/aseprite/aseprite.git

      - name: Build Aseprite
        run: |
          cd aseprite
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo -DLAF_BACKEND=skia -DSKIA_DIR=$HOME/deps/skia -DSKIA_LIBRARY_DIR=$HOME/deps/skia/out/Release-x64 -G Ninja ..
          ninja aseprite
